services:
  # MongoDB база данных
  mongo:
    image: mongo:6
    container_name: superbot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=newbotbase

  # FastAPI бэкенд
  backend:
    build: ./backend
    container_name: superbot-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_DSN=mongodb://mongo:27017/newbotbase
      - PYTHONPATH=/app
    depends_on:
      - mongo
    volumes:
      - ./backend:/app  # Для hot-reload в разработке
      - /app/__pycache__  # Игнорируем кэш Python
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js фронтенд
  frontend:
    build: 
      context: ./frontend
      # Указываем использовать production сборку
      target: runner  # Или builder для разработки
    container_name: superbot-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Не добавляем volumes для production сборки
    restart: unless-stopped

volumes:
  mongo_data: