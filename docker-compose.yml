services:
  # MongoDB база данных
  mongo:
    image: mongo:6
    container_name: superbot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=newbotbase

  # FastAPI бэкенд
  backend:
    build: ./backend
    container_name: superbot-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_DSN=mongodb://mongo:27017/newbotbase
      - PYTHONPATH=/app
    depends_on:
      - mongo
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Next.js фронтенд
  frontend:
    build: 
      context: ./frontend
      target: runner
    container_name: superbot-frontend
    ports:
      - "3000:3000"
    environment:
      
      - NEXT_PUBLIC_API_BASE_URL=http://5.35.12.207:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
